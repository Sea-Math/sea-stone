<!DOCTYPE html>
<html lang="en">
    <head>
        <base href="https://cdn.jsdelivr.net/gh/sea-bean-unblocked/sandstone-gn/">
        <title>Sandstone</title>
        <link rel="icon" type="image/png" href="image.png">
        <style>
            * {
                box-sizing: border-box;
            }

            html, body {
                height: 100%;
                font-family: Arial, sans-serif;
            }

            body {
                margin: 0px;
                display: flex;
                flex-direction: column;
                overflow: hidden;
                background: #101113;
                color: #d7d9dd;
            }

            a, a:hover, a:visited, a:active {
                color: inherit;
                text-decoration: none;
            }

            #options_div {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translateX(-50%) translateY(-50%);
                ; z-index: 1;
                flex-direction: column;
                width: min(400px, 100%);
                height: min(300px, 100%);
                padding: 8px;
                gap: 8px;
                background-color: #ffffff;
            }

            #options_div * {
                margin: 0px;
            }

            #eval_js_input {
                width: 100%;
                height: 120px;
                resize: none;
                margin-top: -4px;
            }

            #address_bar {
                display: flex;
                height: 34px;
                padding: 6px;
                gap: 6px;
                background: #181a1f;
                border-bottom: 1px solid #2b2f38;
            }

            #address_bar * {
                border-radius: 8px;
                border: 1px solid #2b2f38;
                background: #111319;
                color: #d7d9dd;
            }

            #close_options_button {
                padding-left: 8px;
                padding-right: 8px;
            }

            #url_box {
                flex-grow: 1;
                padding: 0px 10px;
            }

            #frame_container {
                flex-grow: 1;
                background-color: #222222;
            }

            #frame_container iframe {
                width: 100%;
                height: 100%;
                border-width: 0px;
            }

            #favicon_container {
                width: 24px;
                text-align: center;
                border: 1px solid #2b2f38;
                background: #111319;
            }

            #tabs_bar {
                height: 38px;
                display: flex;
                align-items: center;
                gap: 6px;
                padding: 6px;
                background: #14161b;
                border-bottom: 1px solid #2b2f38;
            }

            #tabs_list {
                display: flex;
                gap: 6px;
                overflow-x: auto;
                flex-grow: 1;
            }

            .tab_button, #new_tab_button, #navigate_button, #options_button {
                border: 1px solid #2b2f38;
                background: #111319;
                color: #d7d9dd;
                cursor: pointer;
            }

            .tab_button {
                min-width: 130px;
                max-width: 220px;
                padding: 7px 10px;
                border-radius: 10px;
                text-align: left;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .tab_button.active {
                background: #242935;
                border-color: #4a79ff;
            }

            #new_tab_button {
                width: 34px;
                height: 30px;
                border-radius: 10px;
                font-size: 18px;
                line-height: 1;
            }
        </style>
    </head>
    <body>
        <div id="address_bar">
            <div id="favicon_container">
                <p id="favicon_text" style="display: none;">...</p>
                <img id="favicon_img" width="24px" height="24px">
            </div>
            <input id="url_box" type="text" placeholder="Enter URL here..." value="sandstone://home">
            <button id="navigate_button">Submit</button>
            <button id="options_button">Options</button>
        </div>
        <div id="tabs_bar">
            <div id="tabs_list"></div>
            <button id="new_tab_button" title="New tab">+</button>
        </div>
        <div id="frame_container"></div>
        <div id="options_div" style="display: none;">
            <div style="display: flex;">
                <h2 style="margin: 0px;">Options:</h2>
                <div style="flex-grow: 1"></div>
                <button id="close_options_button">X</button>
            </div>
            <div style="display: flex; gap: 8px;">
                <label for="wisp_url_input">Wisp URL:</label>
                <input id="wisp_url_input" type="text" style="flex-grow: 1">
            </div>
            <div style="display: flex; gap: 8px;">
                <p style="font-size: 16px;">Eval JS:</p>
                <div style="flex-grow: 1"></div>
                <button id="eval_js_button">Run</button>
            </div>
            <textarea id="eval_js_input"></textarea>
            <div style="flex-grow: 1"></div>
            <p id="version_p" style="font-size: 14px;">
                <a href="https://github.com/ading2210/sandstone" target="_blank">
                    <i>
                        Sandstone <span id="version_text"></span>
                    </i>
                </a>
            </p>
        </div>
        <script src="index.js"></script>
    </body>
</html>
